  <rect x="16" y="78" width="14" height="36" rx="3" fill="url(#accent)" opacity="0.7"/>
  <!-- Right plates -->
  <rect x="148" y="70" width="16" height="52" rx="4" fill="url(#accent)"/>
  <rect x="162" y="78" width="14" height="36" rx="3" fill="url(#accent)" opacity="0.7"/>
  <!-- Checkmark -->
