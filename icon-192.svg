    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b4d8"/>
      <stop offset="100%" style="stop-color:#0077b6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="43" fill="url(#bg)"/>
  <!-- Barbell bar -->
